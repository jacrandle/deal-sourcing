name: LSG Pipeline

on:
  schedule:
    - cron: "0 7 * * 0"  # Sunday 2am CST (7am UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "refresh"
        type: choice
        options:
          - full
          - refresh
          - new-only
      states:
        description: "Comma-separated state codes (e.g. TX,OK)"
        required: false
        default: "TX"
      years:
        description: "Comma-separated fiscal years (e.g. 2022,2023)"
        required: false
        default: "2022,2023"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        run: python run.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PIPELINE_MODE: ${{ inputs.mode || 'refresh' }}
          PIPELINE_STATES: ${{ inputs.states || 'TX' }}
          PIPELINE_YEARS: ${{ inputs.years || '2022,2023' }}
